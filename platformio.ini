; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; OTA upload environments (master_ota / slave_ota) live in platformio_local.ini,
; which is gitignored because it embeds the OTA password. Copy
; platformio_local.ini.example to platformio_local.ini and fill it in.
[platformio]
extra_configs =
    platformio_local.ini

[env:master]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
    adafruit/DHT sensor library @ ^1.4.6
    bblanchon/ArduinoJson @ ^6.21.0
    fastled/FastLED @ ^3.6.0
upload_speed = 921600
monitor_speed = 115200
build_src_filter = +<main.cpp>

[env:slave]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
    bblanchon/ArduinoJson @ ^6.21.0
    fastled/FastLED @ ^3.6.0
upload_speed = 921600
monitor_speed = 115200
build_src_filter = +<slave_main.cpp>
